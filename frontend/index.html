<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Registry WebUI</title>
    <style>
        body { font-family: sans-serif; margin: 0; line-height: 1.6; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; margin-bottom: 20px; padding-bottom: 10px; }
        .header h1 { margin: 0; font-size: 1.5rem; }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .settings-icon { font-size: 1.5rem; cursor: pointer; user-select: none; }
        .commands-btn { padding: 6px 10px; font-size: 0.9rem; background-color: #198754; }
        .commands-btn:hover { background-color: #146c43; }
        .card { border: 1px solid #ddd; padding: 8px 15px; margin-bottom: 10px; cursor: pointer; border-radius: 4px; width: 420px; max-width: 100%; box-sizing: border-box; }
        .card:hover { background-color: #f0f0f0; }
        .tag-detail { border: 1px solid #ddd; background-color: #f8f9fb; border-radius: 4px; padding: 10px 12px; margin-bottom: 14px; color: #333; }
        .command-block { border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .command-line { white-space: nowrap; overflow-x: auto; display: block; max-width: 100%; font-family: Consolas, monospace; }
        .copy-btn { background-color: #0d6efd; padding: 6px 10px; flex-shrink: 0; }
        .copy-btn:hover { background-color: #0b5ed7; }
        .muted { color: #666; margin-bottom: 12px; }
        .settings-form { border: 1px solid #ccc; padding: 20px; border-radius: 4px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .back-btn { margin-bottom: 20px; background-color: #6c757d; }
        .error { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="registry-name" style="text-align: center; font-weight: bold; margin-bottom: 10px; color: #666;"></div>
        <div id="app"></div>
    </div>

    <script>
        const app = document.getElementById('app');
        const registryNameEl = document.getElementById('registry-name');
        const API_BASE = ''; // In production, this would be the backend URL

        async function fetchApi(endpoint) {
            const response = await fetch(endpoint);
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || 'API error');
            }
            return response.json();
        }

        async function updateRegistryName() {
            try {
                const settings = await fetchApi('/api/settings');
                if (settings.registry_url) {
                    const url = new URL(settings.registry_url);
                    registryNameEl.textContent = url.hostname;
                } else {
                    registryNameEl.textContent = '';
                }
            } catch (err) {
                console.error('Error updating registry name:', err);
                registryNameEl.textContent = '';
            }
        }

        function getCatalogHeader() {
            return `<div class="header"><h1>Container Registry Catalog</h1><div class="header-actions"><button class="commands-btn" onclick="showCommands()">Commands</button><span class="settings-icon" onclick="showSettings()">⚙️</span></div></div>`;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function getRegistryHost() {
            const settings = await fetchApi('/api/settings');
            if (settings.registry_url) {
                try {
                    return new URL(settings.registry_url).host;
                } catch (parseErr) {
                    console.warn('Invalid registry URL in settings:', parseErr);
                }
            }
            return 'localhost:5000';
        }

        function attachCopyHandlers(root = document) {
            const copyButtons = root.querySelectorAll('.copy-btn');
            copyButtons.forEach(btn => {
                if (btn.dataset.bound === 'true') {
                    return;
                }
                btn.dataset.bound = 'true';
                btn.addEventListener('click', async () => {
                    const cmdId = btn.dataset.cmdId;
                    const cmdEl = cmdId ? document.getElementById(cmdId) : null;
                    if (!cmdEl) return;
                    const commandText = cmdEl.textContent || '';
                    try {
                        await navigator.clipboard.writeText(commandText);
                        const oldLabel = btn.textContent;
                        btn.textContent = 'Copied';
                        setTimeout(() => {
                            btn.textContent = oldLabel;
                        }, 1200);
                    } catch (err) {
                        alert('Copy failed. Please copy manually.');
                    }
                });
            });
        }

        async function showCatalog() {
            app.innerHTML = `${getCatalogHeader()}<p>Loading...</p>`;
            try {
                const data = await fetchApi('/api/catalog');
                const repositories = data.repositories || [];

                if (repositories.length === 0) {
                    app.innerHTML = `${getCatalogHeader()}<p>No repositories found.</p><button onclick="showSettings()">Settings</button>`;
                    return;
                }

                let html = getCatalogHeader();
                repositories.forEach(repo => {
                    html += `<div class="card" onclick="showTags('${repo}')">${repo}</div>`;
                });
                app.innerHTML = html;
            } catch (err) {
                app.innerHTML = `${getCatalogHeader()}<div class="error">Error: ${err.message}</div><button onclick="showCatalog()">Retry</button>`;
            }
        }

        async function showTags(repoName) {
            app.innerHTML = `<div class="header"><h1>Tags for ${repoName}</h1><span class="settings-icon" onclick="showSettings()">⚙️</span></div><p>Loading...</p>`;
            try {
                const registryHost = await getRegistryHost();
                const data = await fetchApi(`/api/tags/${repoName}`);
                const tags = data.tags || [];

                let html = `<div class="header"><h1>Tags for ${repoName}</h1><span class="settings-icon" onclick="showSettings()">⚙️</span></div><button class="back-btn" onclick="showCatalog()">Back to Catalog</button><div id="tag-detail" class="tag-detail">Click a tag to see date and file size.</div>`;
                if (tags.length === 0) {
                    html += '<p>No tags found.</p>';
                } else {
                    tags.forEach((tag, idx) => {
                        const imageRef = `${registryHost}/${repoName}:${tag}`;
                        html += `<div class="card tag-card" data-tag="${encodeURIComponent(tag)}">${tag}</div>`;
                        html += `<div class="command-block"><code id="tag-ref-${idx}" class="command-line">${escapeHtml(imageRef)}</code><button class="copy-btn" data-cmd-id="tag-ref-${idx}">Copy</button></div>`;
                    });
                }
                app.innerHTML = html;

                const tagCards = app.querySelectorAll('.tag-card');
                tagCards.forEach(card => {
                    card.addEventListener('click', () => {
                        const selectedTag = decodeURIComponent(card.dataset.tag || '');
                        showTagDetails(repoName, selectedTag);
                    });
                });
                attachCopyHandlers(app);
            } catch (err) {
                app.innerHTML = `<div class="header"><h1>Tags for ${repoName}</h1><span class="settings-icon" onclick="showSettings()">⚙️</span></div><div class="error">Error: ${err.message}</div><button class="back-btn" onclick="showCatalog()">Back to Catalog</button>`;
            }
        }

        async function showTagDetails(repoName, tag) {
            const detailEl = document.getElementById('tag-detail');
            if (!detailEl) return;

            detailEl.textContent = `Loading details for ${tag}...`;
            try {
                const params = new URLSearchParams({ name: repoName, tag });
                const info = await fetchApi(`/api/tag-details?${params.toString()}`);
                const dateText = info.created_at ? new Date(info.created_at).toLocaleString() : 'Unknown';
                const sizeText = info.size_human || 'Unknown';
                detailEl.innerHTML = `<strong>${tag}</strong><br>Date: ${dateText}<br>File size: ${sizeText}`;
            } catch (err) {
                detailEl.innerHTML = `<strong>${tag}</strong><br>Error loading details: ${err.message}`;
            }
        }

        async function showCommands() {
            app.innerHTML = '<div class="header"><h1>Commands</h1><span class="settings-icon" onclick="showCatalog()">⌂</span></div><p>Loading...</p>';
            try {
                const registryHost = await getRegistryHost();

                const commands = [
                    `docker login ${registryHost}`,
                    `docker tag my-local-image:latest ${registryHost}/my-repo:latest`,
                    `docker push ${registryHost}/my-repo:latest`,
                ];

                let html = '<div class="header"><h1>Commands</h1><span class="settings-icon" onclick="showCatalog()">⌂</span></div><button class="back-btn" onclick="showCatalog()">Back to Catalog</button>';
                html += '<p class="muted">Use these commands to upload a container image to your registry.</p>';

                commands.forEach((cmd, idx) => {
                    html += `<div class="command-block"><code id="cmd-${idx}" class="command-line">${escapeHtml(cmd)}</code><button class="copy-btn" data-cmd-id="cmd-${idx}">Copy</button></div>`;
                });

                app.innerHTML = html;
                attachCopyHandlers(app);
            } catch (err) {
                app.innerHTML = `<div class="header"><h1>Commands</h1><span class="settings-icon" onclick="showCatalog()">⌂</span></div><div class="error">Error: ${err.message}</div><button class="back-btn" onclick="showCatalog()">Back to Catalog</button>`;
            }
        }

        async function showSettings() {
            app.innerHTML = '<div class="header"><h1>Settings</h1><span class="settings-icon" onclick="showCatalog()">⚙️</span></div><p>Loading...</p>';
            try {
                const settings = await fetchApi('/api/settings');

                let html = `
                    <div class="header"><h1>Settings</h1><span class="settings-icon" onclick="showCatalog()">⚙️</span></div>
                    <div class="settings-form">
                        <div class="form-group">
                            <label>Registry URL</label>
                            <input type="text" id="regUrl" value="${settings.registry_url}">
                        </div>
                        <div class="form-group">
                            <label>User ID</label>
                            <input type="text" id="regUser" value="${settings.registry_user || ''}">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="regPass" value="">
                        </div>
                        <button onclick="saveSettings()">Save Settings</button>
                        <button class="back-btn" onclick="showCatalog()" style="background-color: #6c757d; margin-left: 10px;">Cancel</button>
                    </div>
                `;
                app.innerHTML = html;
            } catch (err) {
                app.innerHTML = `<div class="header"><h1>Settings</h1><span class="settings-icon" onclick="showCatalog()">⚙️</span></div><div class="error">Error: ${err.message}</div><button onclick="showCatalog()">Back</button>`;
            }
        }

        async function saveSettings() {
            const url = document.getElementById('regUrl').value;
            const user = document.getElementById('regUser').value;
            const pass = document.getElementById('regPass').value;

            app.innerHTML = '<p>Saving...</p>';
            try {
                await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ registry_url: url, registry_user: user, registry_password: pass })
                });
                alert('Settings saved');
                await updateRegistryName();
                showCatalog();
            } catch (err) {
                alert('Error saving settings: ' + err.message);
            }
        }

        // Initial route
        updateRegistryName();
        showCatalog();
    </script>


</body>
</html>
